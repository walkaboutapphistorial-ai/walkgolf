<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WalkGolf App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a1a2e;--g2:#16213e;--g3:#0f3460;
  --acc:#e94560;--acc2:#53d8fb;--acc3:#7bed9f;
  --txt:#f0f0f0;--txt2:#a0aab4;
  --card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);
  --ff:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--g);color:var(--txt);font-family:var(--fb)}
.app{display:flex;flex-direction:column;height:100vh;max-width:420px;margin:0 auto;background:var(--g);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,0.5)}
.screen{flex:1;overflow-y:auto;padding-bottom:72px;display:none;animation:fadeIn .2s ease}
.screen.active{display:block}
.detail-screen{flex:1;overflow-y:auto;padding-bottom:72px;display:none;animation:fadeIn .2s ease}
.detail-screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.topbar{padding:18px 16px 10px;position:sticky;top:0;background:var(--g);z-index:10;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-family:var(--ff);font-size:22px;font-weight:800;letter-spacing:-1px}
.topbar h1 span{color:var(--acc2)}
.topbar-user{display:flex;align-items:center;gap:8px;cursor:pointer}
.search-wrap{padding:10px 16px}
.search{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px}
.search input{background:none;border:none;outline:none;color:var(--txt);font-size:14px;font-family:var(--fb);width:100%}
.search input::placeholder{color:var(--txt2)}
.fab{position:fixed;bottom:82px;right:calc(50% - 196px);width:52px;height:52px;border-radius:50%;background:var(--acc);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 24px rgba(233,69,96,0.5);transition:transform .15s}
.fab:active{transform:scale(.92)}
.games-list{padding:0 16px 8px}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;transition:all .18s;margin-bottom:10px}
.game-card:hover{background:rgba(255,255,255,0.1);border-color:rgba(83,216,251,0.4)}
.game-card .map-name{font-family:var(--ff);font-size:16px;font-weight:700;margin-bottom:6px}
.meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-base{background:rgba(83,216,251,0.15);color:var(--acc2)}
.b-dlc{background:rgba(192,132,252,0.15);color:#c084fc}
.b-easy{background:rgba(123,237,159,0.15);color:var(--acc3)}
.b-hard{background:rgba(233,69,96,0.15);color:var(--acc)}
.b-normal{background:rgba(255,215,0,0.1);color:#ffd700}
.date-txt{font-size:12px;color:var(--txt2)}
.player-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:11px;background:rgba(255,255,255,0.07);padding:3px 9px;border-radius:20px;color:var(--txt2)}
.chip.winner{background:rgba(255,215,0,0.15);color:#ffd700}
.sec-title{font-size:11px;color:var(--txt2);letter-spacing:1.5px;text-transform:uppercase;padding:14px 16px 6px;font-weight:600}
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(22,33,62,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 16px;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 8px;border-radius:10px;border:none;background:none;transition:all .15s}
.nav-btn svg{opacity:.35;transition:opacity .2s}
.nav-btn .nav-lbl{font-size:10px;color:var(--txt2);font-family:var(--fb)}
.nav-btn.active svg{opacity:1;color:var(--acc2)}
.nav-btn.active .nav-lbl{color:var(--acc2)}
.nav-pip{width:4px;height:4px;border-radius:50%;background:transparent}
.nav-btn.active .nav-pip{background:var(--acc2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:none;align-items:flex-end;max-width:420px;left:50%;transform:translateX(-50%)}
.overlay.open{display:flex}
.modal{background:var(--g2);border-radius:22px 22px 0 0;padding:20px 16px 32px;width:100%;max-height:88vh;overflow-y:auto}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal h2{font-family:var(--ff);font-size:18px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:6px;font-weight:500;letter-spacing:.3px}
.field input,.field select{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--txt);font-size:14px;font-family:var(--fb);outline:none}
.field select option{background:var(--g2)}
.btn-primary{width:100%;background:var(--acc);color:#fff;border:none;border-radius:13px;padding:14px;font-family:var(--ff);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px;margin-top:6px;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-sec{width:100%;background:transparent;color:var(--txt2);border:1px solid var(--border);border-radius:13px;padding:12px;font-family:var(--fb);font-size:14px;cursor:pointer;margin-top:8px}
.back-btn{display:flex;align-items:center;gap:5px;padding:14px 16px 6px;background:none;border:none;color:var(--acc2);font-size:13px;cursor:pointer;font-family:var(--fb)}
.detail-head{padding:4px 16px 14px}
.detail-head h2{font-family:var(--ff);font-size:21px;font-weight:800}
.detail-meta{font-size:12px;color:var(--txt2);margin-top:5px}
.winner-banner{margin:0 16px 12px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.25);border-radius:13px;padding:12px 14px;font-size:13px;color:#ffd700;font-weight:500}
.scores-card{margin:0 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.score-row{display:grid;grid-template-columns:1fr 64px 72px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border)}
.score-row:last-child{border-bottom:none}
.score-row.hdr{background:rgba(83,216,251,0.06);font-size:11px;color:var(--txt2)}
.score-name{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
.s-shots{font-size:18px;font-weight:700;font-family:var(--ff);text-align:right}
.s-rel{text-align:right;font-family:var(--ff);font-weight:700;font-size:14px}
.s-neg{color:var(--acc3)}.s-pos{color:var(--acc)}
.add-form{margin:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
.add-form h3{font-family:var(--ff);font-size:13px;color:var(--txt2);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.inline-grid{display:grid;grid-template-columns:1fr 76px 76px;gap:8px;margin-bottom:10px}
.inline-grid .field{margin:0}
.btn-sm{background:var(--acc2);color:#1a1a2e;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--ff);width:100%}
.rank-tbl{margin:8px 16px;border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.rrow{display:grid;grid-template-columns:38px 1fr 52px 56px 52px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--card)}
.rrow:last-child{border-bottom:none}
.rrow.hdr{background:rgba(83,216,251,0.06);font-size:11px;color:var(--txt2);padding:9px 14px}
.rnum{font-family:var(--ff);font-weight:800;font-size:15px}
.gold{color:#ffd700}.silver{color:#c0c0c0}.bronze{color:#cd7f32}
.prow{display:flex;align-items:center;gap:9px}
.sval{text-align:right;font-size:14px;font-weight:500}
.h2h-select{display:flex;align-items:center;gap:10px;padding:10px 16px 4px}
.h2h-select select{flex:1;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px;color:var(--txt);font-size:14px;font-family:var(--fb);outline:none}
.h2h-select select option{background:var(--g2)}
.h2h-vs{font-family:var(--ff);font-size:13px;font-weight:800;color:var(--txt2);flex-shrink:0}
.h2h-hero{margin:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
.h2h-players{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:14px}
.h2h-player{display:flex;flex-direction:column;align-items:center;gap:6px}
.h2h-name{font-family:var(--ff);font-size:13px;font-weight:700;text-align:center}
.h2h-score{font-family:var(--ff);font-size:32px;font-weight:800;line-height:1}
.h2h-lbl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px}
.h2h-bar-wrap{margin-top:4px}
.h2h-bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-bottom:5px}
.h2h-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden;display:flex}
.h2h-bar-a{height:100%;background:var(--acc2);border-radius:3px 0 0 3px;transition:width .4s}
.h2h-bar-b{height:100%;background:var(--acc);border-radius:0 3px 3px 0;transition:width .4s}
.h2h-map-row{display:grid;grid-template-columns:1fr 36px 36px 36px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:6px}
.h2h-map-row:last-child{border-bottom:none}
.h2h-map-row.hdr{background:rgba(83,216,251,0.06);font-size:10px;color:var(--txt2);padding:8px 14px}
.h2h-map-name{font-size:13px;font-weight:500}
.h2h-cell{text-align:center;font-size:13px;font-weight:700;font-family:var(--ff)}
.h2h-cell.win{color:var(--acc3)}.h2h-cell.lose{color:var(--acc)}.h2h-cell.draw{color:var(--txt2)}
.h2h-played{text-align:center;font-size:12px;color:var(--txt2)}
.h2h-empty{text-align:center;padding:24px;color:var(--txt2);font-size:13px}
.wcard{margin:0 16px 8px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;justify-content:space-between;align-items:center}
.wmap{font-family:var(--ff);font-size:14px;font-weight:700}
.wplayer{font-size:12px;color:var(--txt2);margin-top:3px}
.wins-badge{background:rgba(255,215,0,0.12);color:#ffd700;padding:5px 12px;border-radius:20px;font-size:14px;font-weight:700;font-family:var(--ff)}
.friend-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border)}
.friend-row:last-child{border-bottom:none}
.fi{flex:1}
.fname{font-size:14px;font-weight:500}
.fsub{font-size:12px;color:var(--txt2);margin-top:2px}
.faction{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:var(--fb)}
.btn-accept{background:rgba(123,237,159,0.15);color:var(--acc3)}
.req-btn{margin:10px 16px;background:rgba(83,216,251,0.08);color:var(--acc2);border:1px solid rgba(83,216,251,0.2);border-radius:12px;padding:11px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:var(--fb);width:calc(100% - 32px)}
.sec-card{margin:0 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.tabs{display:flex;margin:10px 16px;background:var(--card);border-radius:10px;padding:3px}
.tab{flex:1;text-align:center;padding:7px;border-radius:8px;font-size:12px;cursor:pointer;color:var(--txt2);transition:all .18s;border:none;background:none;font-family:var(--fb)}
.tab.active{background:var(--g3);color:var(--txt);font-weight:500}
/* CHAT */
.chat-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.chat-item:last-child{border-bottom:none}
.cinfo{flex:1;min-width:0}
.cname{font-size:14px;font-weight:500}
.cprev{font-size:12px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctime{font-size:11px;color:var(--txt2);flex-shrink:0}
/* CHAT WINDOW */
.chat-window{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:75%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.4}
.msg.mine{background:var(--acc2);color:#0a1628;align-self:flex-end;border-radius:16px 16px 4px 16px}
.msg.theirs{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-radius:16px 16px 16px 4px}
.msg-name{font-size:10px;color:var(--txt2);margin-bottom:3px}
.msg-time{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
.chat-input-wrap{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--g)}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--txt);font-size:14px;font-family:var(--fb);outline:none}
.chat-send{background:var(--acc2);color:#0a1628;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* AVATAR */
.av-wrap{position:relative;flex-shrink:0}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--ff)}
.online{width:9px;height:9px;border-radius:50%;background:var(--acc3);position:absolute;bottom:0;right:0;border:2px solid var(--g)}
.empty{text-align:center;padding:40px 20px;color:var(--txt2);font-size:14px}
/* AUTH */
.auth-screen{display:none;flex-direction:column;justify-content:center;align-items:center;height:100vh;padding:32px;background:var(--g)}
.auth-screen.active{display:flex}
.auth-logo{font-family:var(--ff);font-size:36px;font-weight:800;margin-bottom:8px}
.auth-logo span{color:var(--acc2)}
.auth-sub{color:var(--txt2);font-size:14px;margin-bottom:40px;text-align:center}
.social-btn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;color:var(--txt);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;font-family:var(--fb);font-weight:500;transition:background .15s}
.social-btn:hover{background:rgba(255,255,255,0.1)}
.divider{display:flex;align-items:center;gap:12px;width:100%;margin:8px 0 16px;color:var(--txt2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--g);flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--acc2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--g3);color:var(--txt);padding:10px 20px;border-radius:22px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--txt2)">Cargando...</div>
</div>

<!-- AUTH -->
<div class="auth-screen" id="auth">
  <div class="auth-logo">Walk<span>Golf</span></div>
  <div class="auth-sub">Registra tus partidas de<br>Walkabout Mini Golf</div>
  <button class="social-btn" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continuar con Google
  </button>
  <div class="divider">o con email</div>
  <div class="field" style="width:100%;margin-bottom:10px">
    <input id="auth-email" placeholder="Email" type="email" style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;color:var(--txt);font-size:14px;font-family:var(--fb);outline:none">
  </div>
  <div class="field" style="width:100%;margin-bottom:0">
    <input id="auth-pass" type="password" placeholder="Contraseña" style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;color:var(--txt);font-size:14px;font-family:var(--fb);outline:none">
  </div>
  <div id="auth-name-wrap" style="width:100%;margin-top:10px;display:none">
    <input id="auth-name" placeholder="Tu nombre de usuario" style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;color:var(--txt);font-size:14px;font-family:var(--fb);outline:none">
  </div>
  <button class="btn-primary" style="margin-top:16px" onclick="loginEmail()">Entrar</button>
  <p id="auth-toggle" style="color:var(--txt2);font-size:12px;margin-top:16px;cursor:pointer">¿No tienes cuenta? <span style="color:var(--acc2)" onclick="toggleRegister()">Regístrate</span></p>
  <div id="auth-err" style="color:var(--acc);font-size:12px;margin-top:8px;text-align:center"></div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- PARTIDAS -->
  <div class="screen active" id="s-partidas">
    <div class="topbar">
      <h1>⛳ Walk<span>Golf</span></h1>
      <div class="topbar-user" id="topbar-user"></div>
    </div>
    <div class="search-wrap">
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.5;flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input placeholder="Buscar partida..." id="search-games" oninput="filterGames(this.value)">
      </div>
    </div>
    <div class="games-list" id="games-list"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail-screen" id="s-detail">
    <button class="back-btn" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Partidas
    </button>
    <div class="detail-head">
      <h2 id="d-title"></h2>
      <div class="detail-meta" id="d-meta"></div>
    </div>
    <div id="d-banner"></div>
    <div class="scores-card" id="d-scores"></div>
    <div class="add-form">
      <h3>+ Agregar jugador</h3>
      <div class="inline-grid">
        <div class="field"><label>Jugador</label>
          <select id="d-player">
            <option value="">Seleccionar</option>
          </select>
        </div>
        <div class="field"><label>Golpes</label><input type="number" id="d-shots" placeholder="45" min="18" max="99"></div>
        <div class="field"><label>H-en-1</label><input type="number" id="d-hio" placeholder="0" min="0" max="18"></div>
      </div>
      <button class="btn-sm" onclick="addPlayer()">Agregar jugador</button>
    </div>
  </div>

  <!-- RANKING -->
  <div class="screen" id="s-ranking">
    <div class="topbar"><h1>🏆 Rank<span>ing</span></h1></div>
    <div class="search-wrap">
      <div class="search">

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
  onSnapshot, query, where, orderBy, serverTimestamp, updateDoc, arrayUnion, arrayRemove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDfsV8hl442eOjno_fcgshj7Z1tTvw1UP8",
  authDomain: "walkgolf-15259.firebaseapp.com",
  projectId: "walkgolf-15259",
  storageBucket: "walkgolf-15259.firebasestorage.app",
  messagingSenderId: "1031082153599",
  appId: "1:1031082153599:web:05957172fb8da426a9914a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── Estado global ──
const AC=['rgba(83,216,251,0.18)','rgba(233,69,96,0.18)','rgba(123,237,159,0.18)','rgba(255,215,0,0.14)','rgba(192,132,252,0.18)','rgba(255,107,157,0.18)'];
const AT=['#53d8fb','#e94560','#7bed9f','#ffd700','#c084fc','#ff6b9d'];
let currentUser=null, games=[], friends=[], currentGameId=null, currentChatFriendId=null, chatUnsub=null, gamesUnsub=null;
let isRegister=false;

function av(name,i){const c=i%6;return`<div class="av" style="background:${AC[c]};color:${AT[c]}">${(name||'?').slice(0,2).toUpperCase()}</div>`;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── AUTH ──
window.toggleRegister=function(){
  isRegister=!isRegister;
  document.getElementById('auth-name-wrap').style.display=isRegister?'block':'none';
  document.querySelector('#auth-toggle span').textContent=isRegister?'Iniciar sesión':'Regístrate';
  document.querySelector('#auth-toggle').innerHTML=isRegister
    ?'¿Ya tienes cuenta? <span style="color:var(--acc2)" onclick="toggleRegister()">Iniciar sesión</span>'
    :'¿No tienes cuenta? <span style="color:var(--acc2)" onclick="toggleRegister()">Regístrate</span>';
};

window.loginGoogle=async function(){
  try{
    const provider=new GoogleAuthProvider();
    const result=await signInWithPopup(auth,provider);
    await ensureUserProfile(result.user);
  }catch(e){showAuthErr(e.message);}
};

window.loginEmail=async function(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const name=document.getElementById('auth-name').value.trim();
  document.getElementById('auth-err').textContent='';
  try{
    if(isRegister){
      if(!name)return showAuthErr('Escribe un nombre de usuario');
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
      await ensureUserProfile(cred.user,name);
    }else{
      await signInWithEmailAndPassword(auth,email,pass);
    }
  }catch(e){
    const msgs={'auth/email-already-in-use':'El email ya está registrado','auth/wrong-password':'Contraseña incorrecta','auth/user-not-found':'Usuario no encontrado','auth/weak-password':'La contraseña debe tener al menos 6 caracteres','auth/invalid-email':'Email inválido'};
    showAuthErr(msgs[e.code]||e.message);
  }
};

function showAuthErr(msg){document.getElementById('auth-err').textContent=msg;}

async function ensureUserProfile(user,displayName){
  const ref=doc(db,'users',user.uid);
  const snap=await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{
      uid:user.uid,
      name:displayName||user.displayName||user.email.split('@')[0],
      email:user.email,
      friends:[],
      createdAt:serverTimestamp()
    });
  }
}

// ── AUTH STATE ──
onAuthStateChanged(auth,async user=>{
  document.getElementById('loading').style.display='none';
  if(user){
    currentUser=user;
    const snap=await getDoc(doc(db,'users',user.uid));
    if(snap.exists()) currentUser._profile=snap.data();
    enterApp();
  }else{
    document.getElementById('auth').classList.add('active');
    document.getElementById('app').style.display='none';
  }
});

// ── ENTER APP ──
function enterApp(){
  document.getElementById('auth').classList.remove('active');
  document.getElementById('app').style.display='flex';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  const name=currentUser._profile?.name||currentUser.displayName||'Tú';
  document.getElementById('topbar-user').innerHTML=`${av(name,0)}<span style="font-size:12px;color:var(--txt2)">${esc(name)}</span><button onclick="window.doSignOut()" style="background:none;border:none;color:var(--txt2);font-size:11px;cursor:pointer;margin-left:4px">Salir</button>`;
  loadGames();
  loadFriends();
  renderChatList();
}

window.doSignOut=async function(){
  if(gamesUnsub)gamesUnsub();
  if(chatUnsub)chatUnsub();
  await signOut(auth);
};

// ── GAMES (solo del usuario) ──
function loadGames(){
  if(gamesUnsub)gamesUnsub();
  const q=query(collection(db,'games'),where('uid','==',currentUser.uid),orderBy('date','desc'));
  gamesUnsub=onSnapshot(q,snap=>{
    games=snap.docs.map(d=>({...d.data(),id:d.id}));
    renderGames(games);
    renderRanking();
    renderWinners();
    populateFriendSelect();
  });
}

// ── FRIENDS ──
async function loadFriends(){
  const snap=await getDoc(doc(db,'users',currentUser.uid));
  const data=snap.data();
  friends=[];
  if(data?.friends?.length){
    for(const fid of data.friends){
      const fs=await getDoc(doc(db,'users',fid));
      if(fs.exists())friends.push({uid:fid,...fs.data()});
    }
  }
  renderFriendsList();
  renderChatList();
  populateFriendSelect();
  loadPendingRequests();
}

function populateFriendSelect(){
  const sel=document.getElementById('d-player');
  const myName=currentUser._profile?.name||currentUser.displayName||'Yo';
  const opts=[{name:myName},...friends];
  sel.innerHTML='<option value="">Seleccionar</option>'+opts.map(f=>`<option>${esc(f.name)}</option>`).join('');
}

function renderFriendsList(){
  const el=document.getElementById('friends-list');
  if(!friends.length){el.innerHTML='<div class="empty">Aún no tienes amigos agregados</div>';return;}
  el.innerHTML=friends.map((f,i)=>`<div class="friend-row">
    <div class="av-wrap">${av(f.name,i)}</div>
    <div class="fi"><div class="fname">${esc(f.name)}</div><div class="fsub">${esc(f.email||'')}</div></div>
    <button class="faction" style="background:var(--card);color:var(--acc2);border:1px solid var(--border)" onclick="openChatWith('${f.uid}','${esc(f.name)}')">💬</button>
  </div>`).join('');
}

window.filterFriends=function(v){
  document.querySelectorAll('#friends-list .friend-row').forEach(r=>{
    r.style.display=r.textContent.toLowerCase().includes(v.toLowerCase())?'':'none';
  });
};

async function loadPendingRequests(){
  const snap=await getDocs(query(collection(db,'friendRequests'),where('to','==',currentUser.uid),where('status','==','pending')));
  const pending=snap.docs.map(d=>({id:d.id,...d.data()}));
  const btn=document.getElementById('pending-btn-wrap');
  if(pending.length){
    btn.innerHTML=`<button class="req-btn" onclick="openOverlay('o-pending')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Solicitudes pendientes (${pending.length})
    </button>`;
    document.getElementById('pending-list').innerHTML=pending.map(p=>`<div class="friend-row">
      <div class="av-wrap">${av(p.fromName,0)}</div>
      <div class="fi"><div class="fname">${esc(p.fromName)}</div></div>
      <button class="faction btn-accept" onclick="acceptRequest('${p.id}','${p.from}')">Aceptar</button>
    </div>`).join('');
  }else{btn.innerHTML='';}
}

window.acceptRequest=async function(reqId,fromUid){
  await updateDoc(doc(db,'friendRequests',reqId),{status:'accepted'});
  await updateDoc(doc(db,'users',currentUser.uid),{friends:arrayUnion(fromUid)});
  await updateDoc(doc(db,'users',fromUid),{friends:arrayUnion(currentUser.uid)});
  toast('¡Amigo agregado!');
  closeOverlay('o-pending');
  loadFriends();
};

window.searchUser=async function(){
  const val=document.getElementById('add-friend-input').value.trim();
  const el=document.getElementById('search-result');
  if(!val)return;
  const snap=await getDocs(query(collection(db,'users'),where('name','==',val)));
  if(snap.empty){el.innerHTML='<div style="color:var(--txt2);font-size:13px;text-align:center">No se encontró ese usuario</div>';return;}
  const found=snap.docs[0];
  if(found.id===currentUser.uid){el.innerHTML='<div style="color:var(--txt2);font-size:13px;text-align:center">Ese eres tú 😄</div>';return;}
  const fd=found.data();
  el.innerHTML=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;display:flex;align-items:center;gap:10px">
    ${av(fd.name,0)}
    <div><div style="font-size:14px;font-weight:500">${esc(fd.name)}</div></div>
    <button class="faction btn-accept" style="margin-left:auto" onclick="sendRequest('${found.id}','${esc(fd.name)}')">Enviar</button>
  </div>`;
};

window.sendRequest=async function(toUid,toName){
  const myName=currentUser._profile?.name||currentUser.displayName||'Alguien';
  await addDoc(collection(db,'friendRequests'),{
    from:currentUser.uid, fromName:myName,
    to:toUid, toName, status:'pending', createdAt:serverTimestamp()
  });
  toast('¡Solicitud enviada!');
  closeOverlay('o-add');
  document.getElementById('add-friend-input').value='';
  document.getElementById('search-result').innerHTML='';
};

// ── GAMES LOGIC ──
function getWinner(g){return g.players?.length?g.players.reduce((a,b)=>a.shots<b.shots?a:b.shots<a.shots?b:a.hio>=b.hio?a:b):null;}
function diffBadge(d){if(d==='Fácil')return'b-easy';if(d==='Difícil')return'b-hard';return'b-normal';}
function typeBadge(t){return t==='Gigante'?'b-dlc':t==='Mini'?'b-hard':'b-base';}

function renderGames(list){
  const el=document.getElementById('games-list');
  if(!list.length){el.innerHTML='<div class="empty">No hay partidas aún.<br>Toca + para crear una</div>';return;}
  el.innerHTML=list.map(g=>{
    const w=getWinner(g);
    return`<div class="game-card" onclick="openDetail('${g.id}')">
      <div class="map-name">${esc(g.map)}</div>
      <div class="meta-row">
        <span class="date-txt">${g.date}</span>
        <span class="badge ${typeBadge(g.type)}">${esc(g.type)}</span>
        <span class="badge ${diffBadge(g.diff)}">${esc(g.diff)}</span>
        <span class="badge" style="background:rgba(255,255,255,0.07);color:var(--txt2)">PAR ${g.par}</span>
      </div>
      <div class="player-chips">
        ${g.players?.length?g.players.map(p=>`<span class="chip${w&&p.name===w.name?' winner':''}">${esc(p.name)}${w&&p.name===w.name?' 🏆':''}</span>`).join(''):'<span class="chip">Sin jugadores aún</span>'}
      </div>
    </div>`;
  }).join('');
}

window.filterGames=function(v){renderGames(games.filter(g=>g.map.toLowerCase().includes(v.toLowerCase())));}

window.openDetail=function(id){
  currentGameId=id;
  const g=games.find(x=>x.id===id);
  document.getElementById('d-title').textContent=g.map;
  document.getElementById('d-meta').textContent=`${g.date} · ${g.type} · ${g.diff} · PAR ${g.par}`;
  refreshDetail(g);
  document.querySelectorAll('.screen,.detail-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-detail').classList.add('active');
  document.getElementById('fab').style.display='none';
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
};

function refreshDetail(g){
  const sorted=[...(g.players||[])].sort((a,b)=>a.shots-b.shots);
  const w=getWinner(g);
  const banner=document.getElementById('d-banner');
  if(w){const r=w.shots-g.par;const sign=r<0?'':r>0?'+':'E';banner.innerHTML=`<div class="winner-banner">🏆 ${esc(w.name)} gana con ${w.shots} golpes (${r===0?'E':sign+r})</div>`;}
  else banner.innerHTML='';
  const sc=document.getElementById('d-scores');
  if(!g.players?.length){sc.innerHTML='<div class="empty" style="padding:24px">Agrega jugadores para ver resultados</div>';return;}
  sc.innerHTML=`<div class="score-row hdr"><span>Jugador</span><span style="text-align:right">Golpes</span><span style="text-align:right">Score</span></div>`
  +sorted.map((p,i)=>{
    const r=p.shots-g.par;const sign=r<0?'':r>0?'+':'E';const cls=r<0?'s-neg':r>0?'s-pos':'';
    return`<div class="score-row" style="${i===0?'background:rgba(255,215,0,0.05)':''}">
      <div class="score-name"><div class="av-wrap">${av(p.name,i)}</div>${esc(p.name)}${i===0?' 🏆':''}</div>
      <div class="s-shots">${p.shots}</div>
      <div class="s-rel ${cls}">${r===0?'E':sign+r}</div>
    </div>`;
  }).join('');
}

window.addPlayer=async function(){
  const g=games.find(x=>x.id===currentGameId);
  const pl=document.getElementById('d-player').value;
  const sh=parseInt(document.getElementById('d-shots').value)||0;
  const hi=parseInt(document.getElementById('d-hio').value)||0;
  if(!pl||sh<1||sh>99)return;
  const players=[...(g.players||[])];
  const ei=players.findIndex(p=>p.name===pl);
  if(ei>=0)players[ei]={name:pl,shots:sh,hio:hi};
  else players.push({name:pl,shots:sh,hio:hi});
  await updateDoc(doc(db,'games',currentGameId),{players});
  document.getElementById('d-player').value='';
  document.getElementById('d-shots').value='';
  document.getElementById('d-hio').value='';
  const updated={...g,players};
  const idx=games.findIndex(x=>x.id===currentGameId);
  if(idx>=0)games[idx]=updated;
  refreshDetail(updated);
  renderRanking();renderWinners();
};

window.goBack=function(){
  document.querySelectorAll('.screen,.detail-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-partidas').classList.add('active');
  document.getElementById('fab').style.display='flex';
  document.getElementById('nav-partidas').classList.add('active');
};

// ── PAR AUTO-CALC ──
window.updatePar=function(){
  const mapVal=document.getElementById('f-map').value;
  const diff=document.getElementById('f-diff').value;
  const parInput=document.getElementById('f-par');
  if(!mapVal||!diff){parInput.value='';return;}
  const parts=mapVal.split('|');
  parInput.value=diff==='Fácil'?parts[1]:parts[2];
};

window.createGame=async function(){
  const mapVal=document.getElementById('f-map').value;
  if(!mapVal)return alert('Selecciona un mapa');
  const par=document.getElementById('f-par').value;
  if(!par)return alert('Selecciona la dificultad para calcular el PAR');
  const[mapName]=mapVal.split('|');
  await addDoc(collection(db,'games'),{
    uid:currentUser.uid,
    map:mapName,
    par:parseInt(par),
    type:document.getElementById('f-type').value||'Normal',
    diff:document.getElementById('f-diff').value||'Fácil',
    date:document.getElementById('f-date').value||new Date().toISOString().split('T')[0],
    players:[],
    createdAt:serverTimestamp()
  });
  closeOverlay('o-new');
  toast('Partida creada');
};

// ── RANKING ──
function renderRanking(){
  const stats={};
  games.forEach(g=>{
    const w=getWinner(g);
    (g.players||[]).forEach(p=>{
      if(!stats[p.name])stats[p.name]={games:0,wins:0,hio:0};
      stats[p.name].games++;stats[p.name].hio+=(p.hio||0);
      if(w&&p.name===w.name)stats[p.name].wins++;
    });
  });
  const sorted=Object.entries(stats).sort((a,b)=>b[1].wins-a[1].wins||b[1].hio-a[1].hio||b[1].games-a[1].games);
  const el=document.getElementById('rank-tbl');
  el.innerHTML=`<div class="rrow hdr"><span>#</span><span>Jugador</span><span style="text-align:right">Part.</span><span style="text-align:right">Vict.</span><span style="text-align:right">H-en-1</span></div>`
  +sorted.map(([name,s],i)=>`<div class="rrow" data-name="${name.toLowerCase()}">
    <span class="rnum ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</span>
    <div class="prow">${av(name,i)}<span style="font-size:14px">${esc(name)}</span></div>
    <span class="sval">${s.games}</span>
    <span class="sval" style="color:var(--acc3);font-weight:700">${s.wins}</span>
    <span class="sval" style="color:#ffd700;font-weight:700">${s.hio}</span>
  </div>`).join('');
}

window.filterRanking=function(v){
  document.querySelectorAll('#rank-tbl .rrow:not(.hdr)').forEach(r=>{
    r.style.display=(r.dataset.name||'').includes(v.toLowerCase())?'':'none';
  });
};

// ── WINNERS ──
function renderWinners(){
  const mapWins={};
  games.forEach(g=>{const w=getWinner(g);if(!w)return;if(!mapWins[g.map])mapWins[g.map]={};mapWins[g.map][w.name]=(mapWins[g.map][w.name]||0)+1;});
  const el=document.getElementById('winners-list');
  if(!Object.keys(mapWins).length){el.innerHTML='<div class="empty">No hay ganadores aún</div>';return;}
  el.innerHTML=Object.entries(mapWins).map(([map,players])=>{
    const sorted=Object.entries(players).sort((a,b)=>b[1]-a[1]);
    return`<div class="sec-title">${esc(map)}</div>
    <div class="sec-card" style="margin:0 16px 10px">
      ${sorted.map(([pl,wins],i)=>`<div class="wcard" style="margin:0;border-radius:0;border-left:none;border-right:none;border-top:none;border-bottom:1px solid var(--border)${i===sorted.length-1?';border-bottom:none':''}">
        <div><div class="wmap">${esc(pl)}</div><div class="wplayer">${wins} victoria${wins!==1?'s':''}</div></div>
        <div class="wins-badge">${i===0?'👑':'🏅'} ${wins}</div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

window.filterWinners=function(v){
  document.querySelectorAll('#winners-list .sec-card').forEach(c=>{
    const title=c.previousElementSibling?.textContent.toLowerCase()||'';
    const show=title.includes(v.toLowerCase());
    c.style.display=show?'':'none';
    if(c.previousElementSibling)c.previousElementSibling.style.display=show?'':'none';
  });
};

// ── H2H ──
function getAllPlayers(){const set=new Set();games.forEach(g=>(g.players||[]).forEach(p=>set.add(p.name)));return Array.from(set).sort();}

window.openH2H=function(preselect){
  const players=getAllPlayers();
  const selA=document.getElementById('h2h-a'),selB=document.getElementById('h2h-b');
  selA.innerHTML=players.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
  selB.innerHTML=players.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
  if(preselect&&players.includes(preselect))selA.value=preselect;
  if(players.length>1)selB.value=preselect?players.find(p=>p!==preselect):players[1];
  renderH2H();
  document.querySelectorAll('.screen,.detail-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-historial').classList.add('active');
  document.getElementById('fab').style.display='none';
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-ranking').classList.add('active');
};

window.goBackFromH2H=function(){
  document.querySelectorAll('.screen,.detail-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-ranking').classList.add('active');
  document.getElementById('nav-ranking').classList.add('active');
  document.getElementById('fab').style.display='none';
};

window.renderH2H=function(){
  const pA=document.getElementById('h2h-a').value,pB=document.getElementById('h2h-b').value;
  const el=document.getElementById('h2h-content');
  if(!pA||!pB||pA===pB){el.innerHTML='<div class="h2h-empty">Selecciona dos jugadores distintos</div>';return;}
  let winsA=0,winsB=0,draws=0,total=0;const mapStats={};
  games.forEach(g=>{
    const pa=(g.players||[]).find(p=>p.name===pA),pb=(g.players||[]).find(p=>p.name===pB);
    if(!pa||!pb)return;total++;
    if(!mapStats[g.map])mapStats[g.map]={wA:0,wB:0,draws:0,played:0};
    mapStats[g.map].played++;
    if(pa.shots<pb.shots){winsA++;mapStats[g.map].wA++;}
    else if(pb.shots<pa.shots){winsB++;mapStats[g.map].wB++;}
    else{draws++;mapStats[g.map].draws++;}
  });
  const pct=total>0?Math.round((winsA/total)*100):50;
  const pctB=total>0?Math.round((winsB/total)*100):50;
  const barA=total>0?Math.round((winsA/(winsA+winsB||1))*100):50;
  const barB=100-barA;
  const playerIdx=getAllPlayers();
  const idxA=playerIdx.indexOf(pA)%6,idxB=(playerIdx.indexOf(pB)+2)%6;
  const colA=AT[idxA],colB=AT[idxB];
  const mapRows=Object.entries(mapStats).map(([map,s])=>{
    const wA=s.wA>s.wB?'win':s.wA<s.wB?'lose':'draw';
    const wB=s.wB>s.wA?'win':s.wB<s.wA?'lose':'draw';
    return`<div class="h2h-map-row"><div class="h2h-map-name">${esc(map)}</div><div class="h2h-cell ${wA}">${s.wA}</div><div class="h2h-cell ${wB}">${s.wB}</div><div class="h2h-played">${s.played}</div></div>`;
  }).join('');
  el.innerHTML=`<div class="h2h-hero">
    <div class="h2h-players">
      <div class="h2h-player">
        <div class="av" style="width:44px;height:44px;border-radius:50%;background:${AC[idxA]};color:${colA};font-size:14px;font-family:var(--ff);font-weight:800;display:flex;align-items:center;justify-content:center">${pA.slice(0,2).toUpperCase()}</div>
        <div class="h2h-name" style="color:${colA}">${esc(pA)}</div>
        <div class="h2h-score" style="color:${colA}">${winsA}</div>
        <div class="h2h-lbl">victorias</div>
      </div>
      <div style="text-align:center">
        <div style="font-family:var(--ff);font-size:11px;color:var(--txt2);line-height:1.8">${total} partidas<br>juntos</div>
        ${draws>0?`<div style="font-size:11px;color:var(--txt2);margin-top:4px">${draws} empate${draws!==1?'s':''}</div>`:''}
      </div>
      <div class="h2h-player">
        <div class="av" style="width:44px;height:44px;border-radius:50%;background:${AC[idxB]};color:${colB};font-size:14px;font-family:var(--ff);font-weight:800;display:flex;align-items:center;justify-content:center">${pB.slice(0,2).toUpperCase()}</div>
        <div class="h2h-name" style="color:${colB}">${esc(pB)}</div>
        <div class="h2h-score" style="color:${colB}">${winsB}</div>
        <div class="h2h-lbl">victorias</div>
      </div>
    </div>
    <div class="h2h-bar-wrap">
      <div class="h2h-bar-lbl"><span style="color:${colA}">${pct}%</span><span style="color:var(--txt2);font-size:10px">% victorias</span><span style="color:${colB}">${pctB}%</span></div>
      <div class="h2h-bar"><div class="h2h-bar-a" style="width:${barA}%;background:${colA}"></div><div class="h2h-bar-b" style="width:${barB}%;background:${colB}"></div></div>
    </div>
  </div>
  ${Object.keys(mapStats).length?`<div class="sec-title">Resultados por mapa</div>
  <div class="sec-card" style="margin:0 16px 16px">
    <div class="h2h-map-row hdr"><span>Mapa</span><span style="text-align:center;color:${colA}">${esc(pA.split(' ')[0])}</span><span style="text-align:center;color:${colB}">${esc(pB.split(' ')[0])}</span><span style="text-align:center">Part.</span></div>
    ${mapRows}
  </div>`:'<div class="h2h-empty">No han jugado juntos aún</div>'}`;
};

// ── CHAT ──
function getChatId(uidA,uidB){return[uidA,uidB].sort().join('_');}

function renderChatList(){
  const el=document.getElementById('chat-list');
  if(!friends.length){el.innerHTML='<div class="empty">Agrega amigos para chatear</div>';return;}
  el.innerHTML=friends.map((f,i)=>`<div class="chat-item" onclick="openChatWith('${f.uid}','${esc(f.name)}')">
    <div class="av-wrap">${av(f.name,i)}</div>
    <div class="cinfo"><div class="cname">${esc(f.name)}</div><div class="cprev">Toca para chatear</div></div>
  </div>`).join('');
}

window.openChatWith=function(friendUid,friendName){
  currentChatFriendId=friendUid;
  document.getElementById('chatwin-name').textContent=friendName;
  document.querySelectorAll('.screen,.detail-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-chatwin').classList.add('active');
  document.getElementById('fab').style.display='none';
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-chat').classList.add('active');
  if(chatUnsub)chatUnsub();
  const chatId=getChatId(currentUser.uid,friendUid);
  const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','asc'));
  chatUnsub=onSnapshot(q,snap=>{
    const msgs=snap.docs.map(d=>d.data());
    const el=document.getElementById('chat-msgs');
    el.innerHTML=msgs.map(m=>{
      const mine=m.uid===currentUser.uid;
      const time=m.createdAt?.toDate?new Date(m.createdAt.toDate()).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}):'';
      return`<div class="msg ${mine?'mine':'theirs'}">
        ${!mine?`<div class="msg-name">${esc(m.name)}</div>`:''}
        ${esc(m.text)}
        <div class="msg-time">${time}</div>
      </div>`;
    }).join('');
    el.scrollTop=el.scrollHeight;
  });
};

window.sendMsg=async function(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text||!currentChatFriendId)return;
  input.value='';
  const chatId=getChatId(currentUser.uid,currentChatFriendId);
  const myName=currentUser._profile?.name||currentUser.displayName||'Yo';
  await addDoc(collection(db,'chats',chatId,'messages'),{
    uid:currentUser.uid,name:myName,text,createdAt:serverTimestamp()
  });
};

// ── NAV & OVERLAY ──
window.showScreen=function(name){
  document.querySelectorAll('.screen,.detail-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('fab').style.display=name==='partidas'?'flex':'none';
  if(name==='chat')renderChatList();
  if(name==='amigos'){renderFriendsList();loadPendingRequests();}
};

window.openOverlay=function(id){document.getElementById(id).classList.add('open');};
window.closeOverlay=function(id){document.getElementById(id).classList.remove('open');};
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});

window.switchTab=function(btn,targetId){
  btn.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['t-recv','t-sent'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=id===targetId?'block':'none';});
};

</script>
